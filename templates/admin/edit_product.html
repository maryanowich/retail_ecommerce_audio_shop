{% extends "base.html" %}

{% block content %}

<div style="max-width:700px; margin:0 auto;">
    
    <h1 style="margin-bottom:20px;">Uredi proizvod</h1>

    <form method="POST" enctype="multipart/form-data" class="card" style="display:flex; flex-direction:column; gap:20px; padding:24px;">

        <div style="margin-bottom:10px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">Šifra proizvoda</label>
            <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="number" name="sku" value="{{ product.sku }}">
        </div>

        <div style="margin-bottom:10px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">Naziv proizvoda</label>
            <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="text" name="name" value="{{ product.name }}">
        </div>

        <div style="display:flex; gap:10px;">
            <div style="flex:1; margin-bottom:10px;">
                <label style="display:block; margin-bottom:6px; font-size:14px;">Brand</label>
                <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="text" name="brand" value="{{ product.brand }}">
            </div>
            <div style="flex:1; margin-bottom:10px;">
                <label style="display:block; margin-bottom:6px; font-size:14px;">Kategorija</label>
                <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="text" name="category" value="{{ product.category }}">
            </div>
        </div>

        <div style="display:flex; gap:10px;">
            <div style="flex:1; margin-bottom:10px;">
                <label style="display:block; margin-bottom:6px; font-size:14px;">MPC (€)</label>
                <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="number" step="0.01" name="mpc" value="{{ product.mpc }}">
            </div>
            <div style="flex:1; margin-bottom:10px;">
                <label style="display:block; margin-bottom:6px; font-size:14px;">Akcijska cijena (€)</label>
                <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="number" step="0.01" name="sale_price" value="{{ product.sale_price }}">
            </div>
        </div>

        <div style="display:flex; gap:10px;">
            <div style="flex:1; margin-bottom:10px;">
                <label style="display:block; margin-bottom:6px; font-size:14px;">Stanje na skladištu</label>
                <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="number" name="stock" value="{{ product.stock }}">
            </div>
            <div style="flex:1; margin-bottom:10px;">
                <label style="display:block; margin-bottom:6px; font-size:14px;">Težina (kg)</label>
                <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="number" step="0.01" name="weight" value="{{ product.weight }}">
            </div>
        </div>

        <div style="margin-bottom:10px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">Opis proizvoda</label>
            <textarea style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white; min-height:80px;" name="description">{{ product.description }}</textarea>
        </div>

        <div style="margin-bottom:10px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">Karakteristike</label>
            <textarea style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white; min-height:80px;" name="specs">{{ product.specs }}</textarea>
        </div>

        <div style="margin-bottom:10px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">Slug (URL)</label>
            <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="text" name="slug" value="{{ product.slug }}">
        </div>

        <div style="display:flex; gap:20px; align-items:center; margin-top:10px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">
                <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="checkbox" name="active" {% if product.active %}checked{% endif %}>
                Aktivno
            </label>
            <label style="display:block; margin-bottom:6px; font-size:14px;">
                <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="checkbox" name="featured" {% if product.featured %}checked{% endif %}>
                Izdvojeno
            </label>
        </div>

        <div style="margin-bottom:10px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">Slika proizvoda</label><br>
            <input style="width:100%; padding:10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white;" type="file" name="image">
        </div>

        <button type="submit" class="btn" style="margin-top:20px; padding:12px; font-size:16px;">
            Spremi promjene
        </button>

    </form>

</div>

{% endblock %}
